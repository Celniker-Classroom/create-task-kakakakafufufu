<!--This project collects data on people's choices regarding a particular issue, organizes feedback data,and visually displays the voting results using 
percentages.It also identifies the most popular choices from these results.The aim is to help administrators or creators gain a clear understanding of user 
preferences and other relevant information.-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote Page</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Vote</h1>
    <hr>
    <h3 id="remind">Choose all the things you like:</h3>
    <input type="checkbox" name="option" id="op1"><label for="op1">Cat</label><br>
    <input type="checkbox" name="option" id="op2"><label for="op2">Dog</label><br>
    <input type="checkbox" name="option" id="op3"><label for="op3">Snake</label><br>
    <input type="checkbox" name="option" id="op4"><label for="op4">Hamster</label><br>
    
    <br>
    <button id="submit">Submit vote</button>
    <hr>

    <h2>Vote Result</h2>
    <p id="totalVotes">Total Votes:</p>
    <p>Vote percent:</p>
    <ul id="result">
        <li id = "percent1">Cat: --</li>
        <li id = "percent2">Dog: --</li>
        <li id = "percent3">Snake: --</li>
        <li id = "percent4">Hamster: --</li>
    </ul>

    <h3 id="mostVote">The most popular thing is:</h3>
    <p id="msg"></p>

    <button id="clearBtn">Clear</button>
</body>
</html>
